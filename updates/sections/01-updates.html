<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>News & Updates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#051221;--ink:#FFFFFF;--ink-2:#D6E2EE;
  --bg-light:#FFFFFF;--bg-alt:#F5F8FA;
  --ink-dark:#0D2436;--ink-mid:#3F546A;
  --teal-deep:#00588B;--teal:#0074B5;--teal-2:#38B6FF;--gold:#A6ECFF;
  --line:rgba(13,36,54,.08);--pad:6vw;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope','Heebo',system-ui,sans-serif;background:var(--bg-0);color:var(--ink-dark);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body.reduce-motion *{animation-duration:0s!important;transition-duration:0s!important}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}

.reveal{opacity:0;transform:translateY(24px) scale(.985);transition:opacity .8s ease, transform .8s cubic-bezier(.16,.84,.28,1)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.15s}
.reveal.d2{transition-delay:.3s}

.hero-banner{
  background: var(--bg-0);
  color: var(--ink);
  padding: 130px var(--pad) 70px;
  position: relative;
  overflow: hidden;
}
.hero-banner .eyebrow{color:var(--teal-2)}
.hero-banner h2.headline{color:var(--ink)}
.hero-banner h2.headline .accent{color:var(--teal-2)}
.hero-banner .section-head .right{color:var(--ink-2)}

.bg-glow{
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 70% 30%, rgba(56,182,255,.08), transparent 50%), radial-gradient(circle at 20% 80%, rgba(123,224,255,.04), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.updates-content{
  position: relative;
  padding: 56px var(--pad) 96px;
  background: linear-gradient(180deg, var(--bg-light) 0%, var(--bg-alt) 100%);
}
.container{max-width:1200px;margin:0 auto}

.section-head{max-width:1200px;margin:0 auto 48px;display:grid;grid-template-columns:auto 1fr;gap:36px;align-items:end}
.section-head .left{max-width:640px}
.section-head .right{align-self:end;font-size:15.5px;line-height:1.7;max-width:440px;color:var(--ink-mid)}
.eyebrow{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--teal-deep);font-weight:800;margin-bottom:16px;display:inline-flex;align-items:center;gap:10px}

h2.headline{font-family:'Manrope';font-weight:800;font-size:clamp(32px,3.8vw,52px);line-height:1.05;letter-spacing:-.02em}
h2.headline .accent{color:var(--teal-deep)}

/* shared source label — plain text, not a boxed pill */
.src-label{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--teal-deep)}
.src-label::before{content:"";width:16px;height:2px;border-radius:2px;background:var(--teal-2)}

/* ---------- LEAD STORY ---------- */
.lead{display:grid;grid-template-columns:1.12fr .88fr;background:var(--ink-dark);border-radius:22px;overflow:hidden;box-shadow:0 40px 80px -40px rgba(6,27,48,.55);margin-bottom:56px}
.lead .lead-media{position:relative;min-height:340px;overflow:hidden;background:linear-gradient(150deg,var(--teal-deep),var(--ink-dark))}
.lead .lead-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.2,.7,.2,1)}
.lead:hover .lead-media img{transform:scale(1.05)}
.lead .lead-body{padding:44px 46px;display:flex;flex-direction:column;justify-content:center;color:#fff;position:relative}
.lead .lead-body .src-label{color:var(--gold)}
.lead .lead-body .src-label::before{background:var(--gold)}
.lead h3{font-family:'Manrope';font-weight:800;font-size:clamp(24px,2.4vw,33px);line-height:1.18;letter-spacing:-.015em;margin:20px 0 0;color:#fff}
.lead h3.he{font-family:'Heebo',sans-serif;direction:rtl;text-align:right;line-height:1.35}
.lead .lead-meta{margin-top:26px;display:flex;align-items:center;gap:14px;color:var(--ink-2);font-size:13.5px;font-weight:600}
.lead .lead-cta{margin-top:22px;display:inline-flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--teal-2);transition:gap .25s}
.lead:hover .lead-cta{gap:15px}

/* ---------- FEATURED GRID ---------- */
.featured{display:grid;grid-template-columns:repeat(4,1fr);gap:30px;margin-bottom:72px}
.f-card{display:flex;flex-direction:column}
.f-card .thumb{position:relative;aspect-ratio:4/3;border-radius:16px;overflow:hidden;background:linear-gradient(150deg,var(--teal-deep),var(--ink-dark));box-shadow:0 18px 36px -22px rgba(13,36,54,.4)}
.f-card .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.2,.7,.2,1)}
.f-card:hover .thumb img{transform:scale(1.06)}
.f-card .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(5,18,33,.28));opacity:0;transition:opacity .3s}
.f-card:hover .thumb::after{opacity:1}
.f-card .src-label{margin:18px 0 0}
.f-card h3{font-family:'Manrope';font-weight:800;font-size:16.5px;line-height:1.34;letter-spacing:-.005em;color:var(--ink-dark);margin-top:11px;transition:color .25s}
.f-card h3.he{font-family:'Heebo',sans-serif;direction:rtl;text-align:right;font-size:17.5px;line-height:1.5}
.f-card:hover h3{color:var(--teal-deep)}
.f-card .date{margin-top:12px;font-size:12.5px;color:var(--ink-mid);font-weight:600}

/* ---------- MORE COVERAGE (borderless list, hairline dividers) ---------- */
.more-head{display:flex;align-items:baseline;justify-content:space-between;gap:20px;margin-bottom:8px}
.more-head h3{font-family:'Manrope';font-weight:800;font-size:22px;letter-spacing:-.01em;color:var(--ink-dark)}
.more-head .count{font-size:13px;color:var(--ink-mid);font-weight:600}
.more-list{border-top:1px solid var(--line)}
.more-item{display:grid;grid-template-columns:150px 1fr auto;gap:26px;align-items:center;padding:22px 6px;border-bottom:1px solid var(--line);transition:padding .25s}
.more-item:hover{padding-left:16px;padding-right:16px}
.more-item .src-label{align-self:center}
.more-item h4{font-family:'Manrope';font-weight:700;font-size:16.5px;line-height:1.4;color:var(--ink-dark);transition:color .25s}
.more-item h4.he{font-family:'Heebo',sans-serif;direction:rtl;text-align:right;font-size:17px}
.more-item:hover h4{color:var(--teal-deep)}
.more-item .right-col{display:flex;align-items:center;gap:18px;justify-self:end}
.more-item .date{font-size:12.5px;color:var(--ink-mid);font-weight:600;white-space:nowrap}
.more-item .arrow{width:34px;height:34px;border-radius:50%;background:var(--bg-alt);display:grid;place-items:center;color:var(--ink-dark);transition:.3s;flex-shrink:0}
.more-item:hover .arrow{background:var(--ink-dark);color:#fff;transform:rotate(-12deg)}

.rise{opacity:1;transform:none}

@media (max-width:1080px){
  .featured{grid-template-columns:repeat(2,1fr);gap:28px}
}
@media (max-width:760px){
  .section-head{grid-template-columns:1fr;gap:18px}
  .lead{grid-template-columns:1fr;margin-bottom:44px}
  .lead .lead-media{min-height:220px;aspect-ratio:16/9}
  .lead .lead-body{padding:30px 26px}
  .featured{gap:26px 22px;margin-bottom:56px}
  .more-item{grid-template-columns:1fr auto;gap:6px 16px}
  .more-item .src-label{grid-column:1/-1;margin-bottom:2px}
  .more-item h4{grid-column:1}
}
@media (max-width:600px){
  :root{--pad:20px}
  .hero-banner{padding:92px var(--pad) 48px}
  .updates-content{padding:44px var(--pad) 64px}
  .section-head{margin-bottom:32px}
  .featured{grid-template-columns:1fr 1fr;gap:22px 18px}
  .f-card h3{font-size:15px}
}
</style>
</head>
<body>
<header class="hero-banner">
  <div class="bg-glow"></div>
  <div class="container" style="position:relative; z-index:2;">
    <div class="section-head">
      <div class="left">
        <h2 class="headline reveal" data-he-html="חדשות <span class=&quot;accent&quot;>וסיקורי עיתונות</span>">In the <span class="accent">Press</span></h2>
      </div>
      <div class="right reveal d1" data-he="סיקורים בתקשורת, הכרזות על תוכניות ורגעים נבחרים מהמרכז — אוסף הכתבות שליוו את הדרך שלנו.">Media coverage, program announcements and milestones — the stories that have followed the hub's journey.</div>
    </div>
  </div>
</header>

<section class="updates-content">
  <div class="container">
    <!-- lead story -->
    <div id="leadSlot"></div>
    <!-- featured grid (real article images) -->
    <div class="featured" id="featuredGrid"></div>
    <!-- more coverage -->
    <div class="more-head">
      <h3 data-he="עוד בתקשורת">More coverage</h3>
      <span class="count" id="moreCount"></span>
    </div>
    <div class="more-list" id="moreList"></div>
  </div>
</section>

<script>
/* Press coverage from the hub's earlier site (resiliencetechhub.org/in-the-press).
   Items with a real article image (assets/press/*) are shown as featured cards;
   the rest appear in the "More coverage" list. /data/news.json overrides this. */
const NEWS_ITEMS = [
  {source:"Calcalist", title:"מסיוע בשינה ועד עזרה נפשית ראשונה: מאיץ הסטארט־אפים משדרות שבונה חוסן", date:"Oct 2025", image:"assets/press/calcalist.jpg", url:"https://www.calcalist.co.il/calcalistech/article/bjpzdh0nee"},
  {source:"The Jerusalem Post", title:"Lydia: A lifeline for PTSD sufferers and their families", date:"Jul 2025", image:"assets/press/jpost-lydia.jpg", url:"https://www.jpost.com/health-and-wellness/mind-and-spirit/article-859820"},
  {source:"The Jerusalem Post", title:"Innovation and investment: Israel's path to national resilience", date:"Jun 2025", image:"assets/press/jpost-opinion.jpg", url:"https://www.jpost.com/opinion/article-858049"},
  {source:"PC", title:"לא רק תל אביב: חממת החדשנות הבאה נולדת בשדרות", date:"Jul 2025", image:"assets/press/pc-meital.jpg", url:"https://www.pc.co.il/featured/433071/"},
  {source:"PC", title:"סטארט-אפים מנסים לשנות את אופי הטיפול בטראומה הלאומית", date:"Dec 2024", image:"assets/press/pc-event.jpg", url:"https://www.pc.co.il/news/420699/"},

  {source:"Geektime", title:"חממת חדשנות חדשה נפתחה בשדרות", date:"Jul 2025", url:"https://www.geektime.co.il/flash/sderot-new-entrepreneurship-program/"},
  {source:"Bizportal", title:"סטארטאפיסטים מהדרום חוברים לטבע במאמצים לטפל בטראומה", date:"Jun 2025", url:"https://www.bizportal.co.il/investment_conference/news/article/20017990"},
  {source:"News08", title:"עלייה חדה בפניות לטיפול נפשי בשדרות", date:"May 2025", url:"https://www.news08.net/%D7%A2%D7%9C%D7%99%D7%99%D7%94-%D7%97%D7%93%D7%94-%D7%91%D7%A4%D7%A0%D7%99%D7%95%D7%AA-%D7%9C%D7%98%D7%99%D7%A4%D7%95%D7%9C-%D7%A0%D7%A4%D7%A9%D7%99-%D7%91%D7%A9%D7%93%D7%A8%D7%95%D7%AA/"},
  {source:"News08", title:"מנהלת תקומה: שדרות כמרכז עולמי לחדשנות בחוסן ובריאות", date:"May 2025", url:"https://www.news08.net/%D7%9E%D7%A0%D7%94%D7%9C%D7%AA-%D7%AA%D7%A7%D7%95%D7%9E%D7%94-%D7%A9%D7%93%D7%A8%D7%95%D7%AA-%D7%9B%D7%9E%D7%A8%D7%9B%D7%96-%D7%A2%D7%95%D7%9C%D7%9E%D7%99-%D7%9C%D7%97%D7%93%D7%A9%D7%A0%D7%95%D7%AA/"},
  {source:"Israel Hayom", title:"מעבדה חיה לפיתוח טכנולוגיות חוסן", date:"", url:"https://www.israelhayom.co.il/tech/tech-news/article/18386831"},
  {source:"News08", title:"בשדרות מקדמים טכנולוגיות לטיפול בטראומה", date:"Sep 2024", url:"https://www.news08.net/%D7%91%D7%A9%D7%93%D7%A8%D7%95%D7%AA-%D7%9E%D7%A7%D7%93%D7%9E%D7%99%D7%9D-%D7%98%D7%9B%D7%A0%D7%95%D7%9C%D7%95%D7%92%D7%99%D7%95%D7%AA-%D7%9C%D7%98%D7%99%D7%A4%D7%95%D7%9C-%D7%91%D7%98%D7%A8%D7%90/"},
  {source:"News1", title:"מנוע לעתיד", date:"", url:"https://m.news1.co.il/Archive/0026-D-172246-00.html?AfterBan=1"}
];
const IMG_BASE = '../../';
const NEWS_URL = '../../data/news.json';

(function(){
  var leadSlot = document.getElementById('leadSlot');
  var featGrid = document.getElementById('featuredGrid');
  var moreList = document.getElementById('moreList');
  var moreCount = document.getElementById('moreCount');

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function isHebrew(t){ return /[֐-׿]/.test(t||''); }
  function imgPath(p){ return IMG_BASE + String(p).replace(/^\/+/,''); }
  var ARROW = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

  function leadCard(n){
    var he = isHebrew(n.title);
    return '<a class="lead rise" href="'+esc(n.url)+'" target="_blank" rel="noopener noreferrer">'+
      '<div class="lead-media"><img src="'+esc(imgPath(n.image))+'" alt="" loading="eager"></div>'+
      '<div class="lead-body">'+
        '<span class="src-label">'+esc(n.source)+'</span>'+
        '<h3 class="'+(he?'he':'')+'">'+esc(n.title)+'</h3>'+
        '<div class="lead-meta">'+(n.date?'<span>'+esc(n.date)+'</span>':'')+'</div>'+
        '<span class="lead-cta" data-he="לכתבה המלאה">Read the full story '+ARROW+'</span>'+
      '</div>'+
    '</a>';
  }
  function featCard(n){
    var he = isHebrew(n.title);
    return '<a class="f-card rise" href="'+esc(n.url)+'" target="_blank" rel="noopener noreferrer">'+
      '<div class="thumb"><img src="'+esc(imgPath(n.image))+'" alt="" loading="lazy"></div>'+
      '<span class="src-label">'+esc(n.source)+'</span>'+
      '<h3 class="'+(he?'he':'')+'">'+esc(n.title)+'</h3>'+
      (n.date?'<span class="date">'+esc(n.date)+'</span>':'')+
    '</a>';
  }
  function moreRow(n){
    var he = isHebrew(n.title);
    return '<a class="more-item rise" href="'+esc(n.url)+'" target="_blank" rel="noopener noreferrer">'+
      '<span class="src-label">'+esc(n.source)+'</span>'+
      '<h4 class="'+(he?'he':'')+'">'+esc(n.title)+'</h4>'+
      '<div class="right-col">'+(n.date?'<span class="date">'+esc(n.date)+'</span>':'')+'<span class="arrow">'+ARROW+'</span></div>'+
    '</a>';
  }

  function render(items){
    var feat = items.filter(function(n){ return n && n.image; });
    var more = items.filter(function(n){ return n && !n.image; });

    leadSlot.innerHTML = feat.length ? leadCard(feat[0]) : '';
    featGrid.innerHTML = feat.slice(1).map(featCard).join('');
    featGrid.style.display = feat.length>1 ? '' : 'none';
    moreList.innerHTML = more.map(moreRow).join('');
    document.querySelector('.more-head').style.display = more.length ? '' : 'none';
    moreCount.textContent = more.length ? String(more.length) : '';

    if(window.IHI18N) IHI18N.apply(IHI18N.get());
    if(window.__frameReport) window.__frameReport();
  }

  render(NEWS_ITEMS);

  fetch(NEWS_URL + '?_=' + Date.now(), {cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){ var items = Array.isArray(data.items) ? data.items.filter(function(n){return n && n.title;}) : []; if(items.length) render(items); })
    .catch(function(){ /* keep the built-in list */ });
})();
</script>
<script src="../../shared/i18n.js"></script>
<script src="_bridge.js" data-frame="updates"></script>
</body>
</html>
