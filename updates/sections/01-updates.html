<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>News & Updates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#051221;--ink:#FFFFFF;--ink-2:#D6E2EE;
  --bg-light:#FFFFFF;--bg-alt:#F5F8FA;
  --ink-dark:#0D2436;--ink-mid:#3F546A;
  --teal-deep:#00588B;--teal:#0074B5;--teal-2:#38B6FF;--gold:#A6ECFF;
  --line:rgba(13,36,54,.08);--pad:6vw;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope','Heebo',system-ui,sans-serif;background:var(--bg-0);color:var(--ink-dark);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body.reduce-motion *{animation-duration:0s!important;transition-duration:0s!important}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}

.reveal{opacity:0;transform:translateY(24px) scale(.985);transition:opacity .8s ease, transform .8s cubic-bezier(.16,.84,.28,1)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.15s}
.reveal.d2{transition-delay:.3s}

.hero-banner{
  background: var(--bg-0);
  color: var(--ink);
  padding: 130px var(--pad) 70px;
  position: relative;
  overflow: hidden;
}
.hero-banner .eyebrow{color:var(--teal-2)}
.hero-banner h2.headline{color:var(--ink)}
.hero-banner h2.headline .accent{color:var(--teal-2)}
.hero-banner .section-head .right{color:var(--ink-2)}

.bg-glow{
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 70% 30%, rgba(56,182,255,.08), transparent 50%), radial-gradient(circle at 20% 80%, rgba(123,224,255,.04), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.updates-content{
  position: relative;
  padding: 56px var(--pad) 96px;
  background: linear-gradient(180deg, var(--bg-light) 0%, var(--bg-alt) 100%);
}
.container{max-width:1200px;margin:0 auto}

.section-head{max-width:1200px;margin:0 auto 56px;display:grid;grid-template-columns:auto 1fr;gap:36px;align-items:end}
.section-head .left{max-width:640px}
.section-head .right{align-self:end;font-size:15.5px;line-height:1.7;max-width:440px;color:var(--ink-mid)}
.eyebrow{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--teal-deep);font-weight:800;margin-bottom:16px;display:inline-flex;align-items:center;gap:10px}

h2.headline{font-family:'Manrope';font-weight:800;font-size:clamp(32px,3.8vw,52px);line-height:1.05;letter-spacing:-.02em}
h2.headline .accent{color:var(--teal-deep)}


.updates-grid{display:grid;grid-template-columns:1.5fr 0.9fr;gap:48px;align-items:stretch}
.press-list{display:flex;flex-direction:column;gap:16px}

.press{display:grid;grid-template-columns:110px 1fr auto;gap:24px;align-items:center;padding:22px 28px;background:#fff;border:1px solid var(--line);border-radius:14px;cursor:pointer;transition:all .3s cubic-bezier(.25,.8,.25,1);position:relative;overflow:hidden;box-shadow:0 8px 24px -10px rgba(13,36,54,.05)}
.press::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--teal-deep);transform:scaleY(0);transition:.25s;transform-origin:bottom}
.press:hover{background:#fff;border-color:var(--teal);box-shadow:0 24px 45px -20px rgba(13,36,54,.12);transform:translateX(-6px)}
.press:hover::before{transform:scaleY(1);transform-origin:top}

.press .logo{height:44px;display:grid;place-items:center;font-family:'Manrope';font-weight:800;font-size:12px;letter-spacing:1.5px;color:var(--ink-dark);background:var(--bg-alt);border:1px solid var(--line);border-radius:8px;text-transform:uppercase;text-align:center;padding:0 8px}
.press .body strong{display:block;font-size:16px;color:var(--ink-dark);line-height:1.45;font-weight:700}
.press .body strong.he{font-family:'Heebo',sans-serif;direction:rtl;text-align:right}
.press .body .meta-row{margin-top:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.press .body .meta-row.he{direction:rtl;justify-content:flex-start}
.press .body .meta-row span{font-size:12.5px;color:var(--ink-mid);letter-spacing:.3px}
.press .body .meta-row .tag{padding:3px 8px;background:rgba(0,116,181,.10);color:var(--teal-deep);border-radius:6px;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}

.press .arrow{width:40px;height:40px;border-radius:50%;background:var(--bg-alt);display:grid;place-items:center;color:var(--ink-dark);transition:.25s;flex-shrink:0;font-size:18px;line-height:1}
.press:hover .arrow{background:var(--ink-dark);color:#fff;transform:rotate(-12deg)}

/* empty state — shown until real coverage is added via the admin */
.follow-note{padding:26px 28px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 24px -10px rgba(13,36,54,.05)}
.follow-note h3{font-family:'Manrope';font-weight:800;font-size:19px;color:var(--ink-dark);margin-bottom:8px}
.follow-note p{font-size:14.5px;line-height:1.65;color:var(--ink-mid);margin-bottom:18px}
.follow-links{display:flex;gap:10px;flex-wrap:wrap}
.follow-links a{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;border:1px solid var(--line);background:var(--bg-alt);color:var(--ink-dark);font-weight:700;font-size:13.5px;transition:.2s}
.follow-links a:hover{background:var(--teal-deep);border-color:var(--teal-deep);color:#fff}

.newsletter{padding:42px 36px;background:linear-gradient(160deg, #051221 0%, #0a1c2e 70%, var(--teal-deep) 130%);color:#fff;border-radius:var(--radius);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;box-shadow:0 35px 70px -25px rgba(6,27,48,.4)}
.newsletter::before{content:"";position:absolute;inset:-30%;background:radial-gradient(circle at 30% 80%, rgba(0,116,181,.25), transparent 60%);pointer-events:none}
.newsletter::after{content:"";position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;border:1px dashed rgba(56,182,255,.35);animation:nl-spin 30s linear infinite;pointer-events:none}
@keyframes nl-spin{to{transform:rotate(360deg)}}
.newsletter > *{position:relative;z-index:2}

.newsletter .tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:12px;display:inline-flex;align-items:center;gap:8px}

.newsletter h3{font-family:'Manrope';font-weight:800;font-size:28px;line-height:1.15;letter-spacing:-.02em;margin-bottom:12px;color:#fff}
.newsletter p{color:var(--ink-2);font-size:14.5px;line-height:1.65;margin-bottom:24px;max-width:340px}

.newsletter form{display:flex;gap:10px;flex-direction:column}
.newsletter input{height:50px;padding:0 18px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:#fff;font-family:inherit;font-size:14px;outline:none;transition:.2s}
.newsletter input::placeholder{color:rgba(255,255,255,.5)}
.newsletter input:focus{border-color:var(--teal-2);background:rgba(255,255,255,.15)}

.newsletter button{height:50px;padding:0 22px;border-radius:12px;background:var(--gold);color:#0E1530;font-weight:800;font-size:14.5px;transition:.2s;letter-spacing:.3px}
.newsletter button:hover{background:#A6ECFF;transform:translateY(-1px)}

.newsletter .tiny{margin-top:16px;font-size:11.5px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:6px}
.newsletter .tiny::before{content:"✓";color:var(--teal-2);font-weight:700}

@media (max-width:1200px){
  .section-head{grid-template-columns:1fr;gap:20px}
  .updates-grid{grid-template-columns:1fr;gap:40px}
}
@media (max-width:650px){
  .press{grid-template-columns:1fr;text-align:left;gap:16px;padding:20px}
  .press .logo{width:fit-content}
  .press .arrow{display:none}
}
</style>
</head>
<body>
<header class="hero-banner">
  <div class="bg-glow"></div>
  <div class="container" style="position:relative; z-index:2;">
    <div class="section-head">
      <div class="left">
        <h2 class="headline reveal" data-he-html="חדשות <span class=&quot;accent&quot;>וסיקורי עיתונות</span>">Recent <span class="accent">News & Press</span></h2>
      </div>
      <div class="right reveal d1" data-he="סיקורים בתקשורת, הכרזות על תוכניות ורגעים נבחרים מהמרכז — מתעדכן בזמן אמת.">Media coverage, program announcements and highlights from the hub — updated as they happen.</div>
    </div>
  </div>
</header>
<section class="updates-content">
  <div class="container">
    <div class="updates-grid">
      <!-- PRESS & NEWS — loaded from /data/news.json (managed via the local admin) -->
      <div class="press-list reveal" id="newsList"></div>

      <!-- NEWSLETTER -->
      <div class="newsletter reveal d1">
        <div class="tag" data-he="הישארו מעודכנים">Stay in the loop</div>
        <h3 data-he="תקציר החוסן">The Resilience Brief</h3>
        <p data-he="רוצים עדכונים על תוכניות, פיילוטים ואירועים? השאירו את כתובת המייל והצוות יוסיף אתכם לרשימה.">Want updates on programs, pilots and events? Leave your email and the team will add you to the list.</p>
        <form id="newsletterForm">
          <input type="email" required placeholder="your@email.com" aria-label="Email address" data-he-aria-label="כתובת אימייל">
          <button type="submit" data-he="הרשמו אותי">Sign me up</button>
        </form>
        <div class="tiny" data-he="נשלח ישירות לצוות המרכז. בלי ספאם.">Goes straight to the hub team. No spam.</div>
      </div>
    </div>
  </div>
</section>

<script>
/* news items live in /data/news.json and are managed via the local admin tool */
const NEWS_URL = '../../data/news.json';
const FOLLOW_HTML =
  '<div class="follow-note">'+
    '<h3 data-he="סיקורים והכרזות">Coverage &amp; announcements</h3>'+
    '<p data-he="סיקורי תקשורת והכרזות על תוכניות מתפרסמים כאן. לעדכונים שוטפים מהמרכז, עקבו אחרינו:">Press coverage and program announcements are published here. For day-to-day updates from the hub, follow us:</p>'+
    '<div class="follow-links">'+
      '<a href="https://il.linkedin.com/company/resilience-health-innovation-hub" target="_blank" rel="noopener noreferrer">LinkedIn</a>'+
      '<a href="https://www.facebook.com/profile.php?id=61560256910952" target="_blank" rel="noopener noreferrer">Facebook</a>'+
      '<a href="https://www.resiliencetechhub.org/" target="_blank" rel="noopener noreferrer">resiliencetechhub.org</a>'+
    '</div>'+
  '</div>';

(function(){
  var list = document.getElementById('newsList');
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function isHebrew(t){ return /[֐-׿]/.test(t||''); }

  function render(items){
    if(!items || !items.length){ list.innerHTML = FOLLOW_HTML; done(); return; }
    list.innerHTML = items.map(function(n){
      var he = isHebrew(n.title);
      var meta = [n.tag ? '<span class="tag">'+esc(n.tag)+'</span>' : '', n.date ? '<span>'+esc(n.date)+'</span>' : ''].join('');
      var tagOpen = n.url ? '<a class="press" href="'+esc(n.url)+'" target="_blank" rel="noopener noreferrer">' : '<article class="press">';
      var tagClose = n.url ? '</a>' : '</article>';
      return tagOpen+
        '<div class="logo">'+esc(n.source||'News')+'</div>'+
        '<div class="body">'+
          '<strong class="'+(he?'he':'')+'">'+esc(n.title)+'</strong>'+
          '<div class="meta-row '+(he?'he':'')+'">'+meta+'</div>'+
        '</div>'+
        '<span class="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>'+
      tagClose;
    }).join('') + FOLLOW_HTML.replace(/<h3[^>]*>Coverage &amp; announcements<\/h3>/,'<h3 data-he="עקבו אחרינו">Follow along</h3>').replace(/<p[^>]*>[^<]*<\/p>/,'');
    done();
  }
  function done(){ if(window.IHI18N) IHI18N.apply(IHI18N.get()); if(window.__frameReport) window.__frameReport(); }

  fetch(NEWS_URL)
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){ render(Array.isArray(data.items)?data.items:[]); })
    .catch(function(){ render([]); });
})();

document.getElementById('newsletterForm').addEventListener('submit',function(e){
  e.preventDefault();
  var email = e.target.querySelector('input').value;
  location.href = 'mailto:Rh.innovationhub@gmail.com?subject=' +
    encodeURIComponent('Newsletter signup — The Resilience Brief') +
    '&body=' + encodeURIComponent('Hi, please add me to the newsletter: ' + email);
});
</script>
<script src="../../shared/i18n.js"></script>
<script src="_bridge.js" data-frame="updates"></script>
</body>
</html>
