<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Innovation Hub · Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#051221;--paper-2:#F4F7FA;
  --ink:#FFFFFF;--ink-2:#D6E2EE;--dim:#9AB1C7;--ink-dark:#0D2436;--ink-mid:#3F546A;
  --teal:#0074B5;--teal-2:#38B6FF;--teal-deep:#00588B;--gold:#A6ECFF;
  --line:rgba(180,210,225,.13);--rule:rgba(13,36,54,.10);--pad:6vw;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope','Heebo',system-ui,sans-serif;background:var(--bg-0);color:var(--ink-dark);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
body.fs-lg{font-size:18px}body.fs-xl{font-size:20px}
body.hc{filter:contrast(1.12) saturate(1.15)}
body.ul-links a{text-decoration:underline}
body.reduce-motion *{animation-duration:0s!important;transition-duration:0s!important}
.reveal{opacity:0;transform:translateY(26px) scale(.985);transition:opacity .8s ease, transform .8s cubic-bezier(.16,.84,.28,1)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.1s}
section{position:relative;padding:96px var(--pad)}
.section-head{max-width:1240px;margin:0 auto 56px}
.section-head.center{text-align:center;max-width:820px;margin-left:auto;margin-right:auto}
.section-head.center .right{margin:18px auto 0;font-size:16.5px;line-height:1.7;max-width:600px;color:var(--ink-mid)}
.eyebrow{font-size:11.5px;letter-spacing:4.5px;text-transform:uppercase;font-weight:800;margin-bottom:16px;display:inline-flex;align-items:center;gap:10px;color:var(--teal-deep)}
.section-head.center .eyebrow{justify-content:center}

h2.headline{font-family:'Manrope';font-weight:800;font-size:clamp(32px,3.8vw,52px);line-height:1.05;letter-spacing:-.02em}
h2.headline .accent{color:var(--teal-deep)}

.hero-banner{
  background: var(--bg-0);
  color: var(--ink);
  text-align: center;
  padding: 100px var(--pad) 48px;
  position: relative;
  overflow: hidden;
}
.hero-banner .eyebrow{color:var(--teal-2)}
.hero-banner h2.headline .accent{color:var(--teal-2)}
.hero-banner .section-head.center .right{color:var(--ink-2)}

.bg-glow{
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 70% 30%, rgba(56,182,255,.08), transparent 50%), radial-gradient(circle at 20% 80%, rgba(123,224,255,.04), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.team-content{
  background: linear-gradient(180deg, var(--paper-2) 0%, #E9EFF4 100%);
  position: relative;
  overflow: hidden;
  padding: 40px var(--pad) 96px;
}
.team-content::before{content:"";position:absolute;top:-120px;left:-120px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle, rgba(0,116,181,.10), transparent 65%);pointer-events:none}
.team-content::after{content:"";position:absolute;bottom:-120px;right:-120px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle, rgba(123,224,255,.08), transparent 65%);pointer-events:none}
.team-tabs{position:relative;z-index:2;display:flex;gap:6px;background:#fff;border:1px solid var(--rule);border-radius:999px;padding:6px;width:fit-content;margin:0 auto 56px;box-shadow:0 10px 24px -14px rgba(13,36,54,.18)}
.team-tab{position:relative;z-index:2;padding:12px 30px;border-radius:999px;background:transparent;color:var(--ink-mid);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:color .25s}
.team-tab.active{color:#fff}
.team-tab:not(.active):hover{color:var(--ink-dark)}
.tab-pill{position:absolute;top:6px;bottom:6px;border-radius:999px;background:var(--ink-dark);transition:left .35s cubic-bezier(.2,.7,.2,1),width .35s cubic-bezier(.2,.7,.2,1);z-index:1;left:6px;width:0}
.team-grid{position:relative;z-index:2;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:36px 20px;max-width:1280px;margin:0 auto}
.person{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;background:transparent;border:0;box-shadow:none;transition:transform .35s}
.person:hover{transform:translateY(-6px)}
.person .photo{position:relative;width:100%;max-width:178px;aspect-ratio:1;border-radius:50%;overflow:hidden;border:2px solid var(--ink-dark);box-shadow:0 14px 30px -18px rgba(13,36,54,.34);transition:box-shadow .35s, border-color .35s}
.person:hover .photo{box-shadow:0 22px 44px -20px rgba(13,36,54,.5);border-color:var(--teal-deep)}
.person .pimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 26%;z-index:1;filter:grayscale(0.1) saturate(1.02);transition:filter 0.3s ease}
.person:hover .pimg{filter:grayscale(0) saturate(1.1)}
.person .meta{margin-top:14px;padding:0 6px}
.person .name{font-family:'Manrope';font-weight:800;font-size:16px;letter-spacing:-.012em;color:var(--ink-dark);line-height:1.22}
.person .role{margin-top:5px;font-size:12px;color:var(--ink-mid);font-weight:500;line-height:1.4}
@media (max-width:600px){section{padding:80px 6vw}}
</style>
</head>
<body>
<header class="hero-banner">
  <div class="bg-glow"></div>
  <div class="section-head center" style="position:relative; z-index:2;">
    <div class="eyebrow" data-he="צוות">Team</div>
    <h2 class="headline reveal" data-he-html="האנשים שמאחורי <span class=&quot;accent&quot;>המשימה</span>">The people behind <span class="accent">the mission</span></h2>
    <div class="right reveal d1" data-he="צוות רב-תחומי של קלינאים, אנשי תפעול, חוקרים ומומחים מכל העולם, שנבחרו בזכות ההשפעה המוכחת שלהם על חדשנות בתחום החוסן.">A multidisciplinary team of clinicians, operators, researchers and global experts, each chosen for their proven impact in resilience innovation.</div>
  </div>
</header>
<section class="team-content" id="team">
  <div class="team-tabs" role="tablist">
    <span class="tab-pill" id="tabPill"></span>
    <button class="team-tab active" data-tab="core" role="tab" aria-selected="true" data-he="צוות הליבה">Core Team</button>
    <button class="team-tab" data-tab="board" role="tab" aria-selected="false" data-he="הוועדה המייעצת">Advisory Board</button>
    <button class="team-tab" data-tab="experts" role="tab" aria-selected="false" data-he="מומחים">Experts</button>
  </div>
  <div class="team-grid" id="teamGrid"></div>
</section>

(function(){
  const grid=document.getElementById('teamGrid');
  const G=['#2BA8E0,#112c47','#0074B5,#00588B','#8A5BFF,#5E2DBA','#7BE0FF,#2B8FB3','#3D7BFF,#1F3FE0','#C24BFF,#8A3FC8','#38B6FF,#1A6B8F','#A6ECFF,#3D9BC4'];
  const esc=s=>s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  function render(key){
    grid.innerHTML=TEAM[key].map((p,i)=>{
      return `
        <article class="person" style="opacity:0;transform:translateY(20px)">
          <div class="photo" style="background:linear-gradient(135deg, ${G[i%G.length]});">
            <img class="pimg" src="../../assets/team/${p.img}" alt="${esc(p.n)}" loading="lazy"/>
          </div>
          <div class="meta">
            <div class="name">${esc(p.n)}</div>
            <div class="role" data-he="${esc(ROLE_HE[p.r]||p.r)}">${esc(p.r)}</div>
          </div>
        </article>`;
    }).join('');
    if(window.IHI18N) IHI18N.apply(IHI18N.get());
    requestAnimationFrame(()=>{
      grid.querySelectorAll('.person').forEach((el,i)=>{
        setTimeout(()=>{
          el.style.opacity=1;el.style.transform='translateY(0)';
          el.style.transition='opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1), border-color .35s, box-shadow .35s';
          if(window.__frameReport) window.__frameReport();
        },i*30);
      });
    });
  }
  function positionPill(){
    const active=document.querySelector('.team-tab.active');
    const pill=document.getElementById('tabPill');
    if(active&&pill){pill.style.left=active.offsetLeft+'px';pill.style.width=active.offsetWidth+'px';}
  }
  document.querySelectorAll('.team-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.team-tab').forEach(x=>{x.classList.remove('active');x.setAttribute('aria-selected','false')});
    t.classList.add('active');t.setAttribute('aria-selected','true');
    positionPill();render(t.dataset.tab);
  }));
  render('core');
  requestAnimationFrame(positionPill);
  addEventListener('resize',positionPill);
})();
