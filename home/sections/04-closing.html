<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Innovation Hub · Contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#FFFFFF;--teal-deep:#00588B;--teal-dark:#051221;--teal-band:#004873;
  --gold:#A6ECFF;--gold-2:#A6ECFF;--pad:6vw;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope','Heebo',system-ui,sans-serif;background:var(--teal-dark);color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
body.fs-lg{font-size:18px}body.fs-xl{font-size:20px}
body.hc{filter:contrast(1.12) saturate(1.15)}
body.reduce-motion *{animation-duration:0s!important;transition-duration:0s!important}

.closing{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg, var(--teal-band) 0%, var(--teal-deep) 60%, var(--teal-dark) 100%);color:#fff;padding:clamp(28px,4vh,46px) var(--pad);text-align:center;overflow:hidden}
.closing::before{content:"";position:absolute;inset:0;background-image:radial-gradient(1px 1px at 18% 30%, var(--gold), transparent),radial-gradient(1px 1px at 80% 70%, #fff, transparent),radial-gradient(1px 1px at 50% 90%, var(--gold), transparent),radial-gradient(1px 1px at 30% 80%, #fff, transparent),radial-gradient(1.5px 1.5px at 70% 30%, var(--gold), transparent);opacity:.55}
.closing::after{content:"";position:absolute;left:50%;top:-80px;transform:translateX(-50%);width:520px;height:520px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,.16), transparent 65%);pointer-events:none}
.closing > *{position:relative;z-index:2}
.closing .small{font-size:11.5px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.85);font-weight:800;margin-bottom:18px;display:inline-flex;align-items:center;gap:12px}

.closing h2{font-family:'Manrope';font-weight:800;font-size:clamp(28px,3.5vw,46px);line-height:1.15;letter-spacing:-.018em;max-width:840px;margin:0 auto}
.closing h2 .y{color:#D4F6FF;text-shadow:0 0 28px rgba(174,236,255,.4)}
.closing p{margin-top:18px;color:rgba(255,255,255,.88);font-size:16px;max-width:560px;margin-left:auto;margin-right:auto;line-height:1.65}
.closing .btn-gold{margin-top:30px;height:54px;padding:0 30px;border-radius:999px;background:#fff;color:#0074B5;font-weight:800;font-size:15px;transition:.3s cubic-bezier(0.16, 1, 0.3, 1);box-shadow:0 12px 30px -10px rgba(0,0,0,.3);display:inline-flex;align-items:center;gap:8px;letter-spacing:.2px}
.closing .btn-gold:hover{background:#EAF8FF;color:#00588B;transform:translateY(-2px);box-shadow:0 18px 35px -10px rgba(56,182,255,.4)}
@media (max-width:600px){
  .closing{padding:26px 6vw}
  .closing h2{font-size:clamp(24px,6.6vw,30px);line-height:1.15}
  .closing p{font-size:15px;margin-top:12px;line-height:1.5;max-width:520px}
  .closing .btn-gold{margin-top:20px;height:48px;font-size:15px;padding:0 26px}
}
</style>
</head>
<body>
<section class="closing" id="closing">
  <h2 data-he-html="יחד נגדיר מחדש את <span class=&quot;y&quot;>עתיד החדשנות בתחום החוסן</span>">Together we will redefine <span class="y">the future of resilience innovation</span></h2>
  <p data-he="דברו איתנו עם צוות Innovation Hub, בין אם אתם יזמים, קלינאים, שותפים או משקיעים.">Get in touch with the Innovation Hub team, whether you're a founder, a clinician, a partner, or an investor.</p>
  <button class="btn-gold" id="contactBtn" data-he="צרו קשר ←">Contact Us →</button>
</section>
<script>
document.getElementById('contactBtn').addEventListener('click', () => {
  window.parent.postMessage({t: 'ih:modal'}, '*');
});
</script>
<script src="../../shared/i18n.js"></script>
<script src="_bridge.js" data-frame="closing"></script>
</body>
</html>
