<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovation Hub · Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="preload" as="image" href="../../assets/field-poster.jpg">
<style>
:root{
  --bg-0:#051221;--bg-1:#0a1c2e;--bg-2:#112c47;--bg-3:#1c446c;
  --paper:#FFFFFF;--paper-2:#F4F7FA;
  --ink:#FFFFFF;--ink-2:#D6E2EE;--dim:#9AB1C7;--dim-2:#6B859A;--ink-dark:#0D2436;--ink-mid:#3F546A;
  --teal:#0074B5;--teal-2:#38B6FF;--teal-deep:#00588B;
  --gold:#A6ECFF;--gold-2:#A6ECFF;--violet:#8A5BFF;
  --line:rgba(180,210,225,.13);--rule:rgba(13,36,54,.10);--pad:6vw;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Manrope','Heebo',system-ui,sans-serif;background:var(--bg-0);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
body.fs-lg{font-size:18px}body.fs-xl{font-size:20px}
body.hc{filter:contrast(1.12) saturate(1.15)}
body.reduce-motion *{animation-duration:0s!important;transition-duration:0s!important}

.btn-primary{height:50px;padding:0 26px;border-radius:999px;background:linear-gradient(135deg, var(--teal) 0%, #00588B 100%);color:#fff;font-weight:700;font-size:14.5px;letter-spacing:.2px;transition:.3s cubic-bezier(0.16, 1, 0.3, 1);box-shadow:0 10px 25px -8px rgba(0,116,181,.5);display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:linear-gradient(135deg, var(--teal-2) 0%, var(--teal) 100%);color:#fff;box-shadow:0 15px 30px -8px rgba(56,182,255,.6);transform:translateY(-2px)}
.btn-ghost{height:50px;padding:0 20px;border-radius:999px;background:transparent;color:var(--ink);border:1px solid var(--line);font-weight:600;font-size:13.5px;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-ghost:hover{border-color:rgba(56,182,255,.45);color:var(--teal-2)}

@keyframes hero-in{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.hero-copy > *{opacity:0;animation:hero-in .9s cubic-bezier(.16,.84,.28,1) forwards}
.hero-copy > *:nth-child(1){animation-delay:.15s}
.hero-copy > *:nth-child(2){animation-delay:.28s}
.hero-copy > *:nth-child(3){animation-delay:.40s}
.hero-copy > *:nth-child(4){animation-delay:.50s}
.hero-copy > *:nth-child(5){animation-delay:.60s}
.hero-visual{opacity:0;animation:hero-in 1.1s cubic-bezier(.16,.84,.28,1) .35s forwards}

.hero{position:relative;height:100vh;min-height:680px;overflow:hidden;background:radial-gradient(900px 700px at 78% 50%, var(--bg-2) 0%, var(--bg-1) 35%, var(--bg-0) 80%),radial-gradient(600px 500px at 18% 92%, rgba(31,93,160,.20), transparent 60%),var(--bg-0)}
.hero::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1px 1px at 18% 22%, var(--gold), transparent),radial-gradient(1px 1px at 32% 70%, var(--gold), transparent),radial-gradient(1px 1px at 88% 28%, var(--gold), transparent),radial-gradient(1px 1px at 65% 85%, var(--gold), transparent),radial-gradient(1.5px 1.5px at 78% 62%, #fff, transparent),radial-gradient(1px 1px at 12% 88%, var(--gold), transparent),radial-gradient(1px 1px at 92% 76%, #fff, transparent),radial-gradient(1px 1px at 8% 45%, var(--teal-2), transparent);opacity:.6}
/* content band tuned so on a ~1920px screen the copy starts ~175px from the left
   and the globe ends ~175px from the right — spread out, but not edge-hugging */
.hero-grid{position:relative;z-index:5;height:100%;max-width:1720px;margin:0 auto;display:grid;grid-template-columns:1.05fr .95fr;align-items:center;padding:64px clamp(20px,4vw,75px);gap:clamp(30px,4vw,64px)}
.hero-copy{max-width:600px}
.hero h1{font-family:'Manrope';font-weight:800;font-size:clamp(34px,4vw,68px);line-height:1.04;letter-spacing:-.02em}
.hero h1 .b{color:var(--teal-2)}
.hero .lead{margin-top:18px;color:var(--ink-2);font-size:16px;line-height:1.62;max-width:500px}
.hero .lead + .lead{margin-top:10px;color:var(--dim);font-size:14.5px}
.hero .cta-row{margin-top:26px;display:flex;gap:12px;flex-wrap:wrap}
/* globe sits at the END of its column so its right margin mirrors the copy's left margin */
.hero-visual{position:relative;height:100%;display:grid;place-items:center end}
.globe-stage{position:relative;width:min(560px,39vw);aspect-ratio:1;filter:drop-shadow(0 30px 70px rgba(31,93,160,.4))}
.globe-stage::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:62%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle, rgba(31,93,160,.45), rgba(138,91,255,.18) 45%, transparent 70%);filter:blur(22px);animation:hero-halo 5s ease-in-out infinite;z-index:1}
@keyframes hero-halo{0%,100%{opacity:.85}50%{opacity:1}}
.globe-svg{position:relative;z-index:2;width:100%;height:100%}
.globe-spin{transform-origin:200px 200px;transform-box:view-box;animation:globe-spin 110s linear infinite}
@keyframes globe-spin{to{transform:rotate(360deg)}}
.globe-logo{opacity:.96;filter:drop-shadow(0 10px 26px rgba(0,0,0,.45))}
.orbit-sat{animation:tw 3.2s ease-in-out infinite;transform-origin:center}
.spark{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 12px #fff;animation:tw 2.4s ease-in-out infinite;z-index:3}
.s1{width:5px;height:5px;top:14%;right:-2%;background:var(--teal-2);box-shadow:0 0 14px var(--teal-2)}
.s2{width:6px;height:6px;bottom:12%;left:-3%;background:var(--gold);box-shadow:0 0 14px var(--gold);animation-delay:.6s}
.s3{width:3px;height:3px;top:54%;right:-5%;animation-delay:1.2s}
.s4{width:4px;height:4px;top:36%;left:-4%;background:var(--violet);box-shadow:0 0 14px var(--violet);animation-delay:1.7s}
@keyframes tw{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
@media (max-width:900px){
  .hero{height:auto;min-height:100vh}
  .hero-grid{grid-template-columns:1fr;padding:110px var(--pad) 60px}
  .hero-visual{display:none}
}

/* ── HERO BACKGROUND SLIDESHOW + BRAND-BLUE VEIL ──────────────────
   Three photos cross-fade slowly behind the copy (place → work →
   community). A brand-blue veil, darker on the text side, keeps the
   heading readable. The old rotating globe is replaced by this. */
.hero-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.hero-bg .slide{position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0;transform:scale(1.06);will-change:opacity,transform;
  animation:heroFade 24s ease-in-out infinite, heroKen 24s ease-in-out infinite}
.hero-bg .slide:nth-child(1){background-image:url('../../assets/field-poster.jpg')}
.hero-bg .slide:nth-child(2){background-image:url('../../assets/photos/workshop.jpg');animation-delay:-8s,-8s}
.hero-bg .slide:nth-child(3){background-image:url('../../assets/photos/founders-group.avif');animation-delay:-16s,-16s}
@keyframes heroFade{0%{opacity:0}4%{opacity:1}29%{opacity:1}37%{opacity:0}100%{opacity:0}}
@keyframes heroKen{0%{transform:scale(1.05)}37%{transform:scale(1.12)}100%{transform:scale(1.12)}}
/* Veil shape: dark on the text side (legibility) and a soft dark pool behind
   the globe (so it separates from the photo), with the photo showing — muted —
   in the middle. Keeps contrast gentle so text, globe and image sit together. */
/* Three stacked layers (top→bottom): a dark pool behind the globe, a
   text-side/edge darkening, and a saturated brand-blue wash over the WHOLE
   image so it reads as a real blue filter (not just a darkening). */
.hero-veil{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(880px 880px at 82% 46%, rgba(5,18,33,.88) 0%, rgba(6,32,54,.4) 44%, transparent 72%),
    linear-gradient(to right, rgba(5,18,33,.95) 0%, rgba(5,18,33,.66) 30%, rgba(6,28,50,.14) 52%, rgba(6,28,50,.14) 64%, rgba(5,18,33,.5) 100%),
    linear-gradient(rgba(0,84,138,.5), rgba(0,52,92,.56))}
html[dir=rtl] .hero-veil{
  background:
    radial-gradient(880px 880px at 18% 46%, rgba(5,18,33,.88) 0%, rgba(6,32,54,.4) 44%, transparent 72%),
    linear-gradient(to left, rgba(5,18,33,.95) 0%, rgba(5,18,33,.66) 30%, rgba(6,28,50,.14) 52%, rgba(6,28,50,.14) 64%, rgba(5,18,33,.5) 100%),
    linear-gradient(rgba(0,84,138,.5), rgba(0,52,92,.56))}
@media (max-width:900px){
  /* on phones the copy sits over the whole image: darken top-to-bottom, plus
     the same brand-blue wash */
  .hero-veil,html[dir=rtl] .hero-veil{
    background:
      linear-gradient(to bottom, rgba(5,18,33,.8), rgba(6,28,50,.42) 45%, rgba(5,18,33,.9)),
      linear-gradient(rgba(0,84,138,.5), rgba(0,52,92,.56))}
}
@media (prefers-reduced-motion:reduce){
  .hero-bg .slide{animation:none}
  .hero-bg .slide:nth-child(1){opacity:1}
}
</style>
</head>
<body>
<header class="hero" id="top">
  <div class="hero-bg" aria-hidden="true">
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="hero-veil"></div>
  </div>
  <div class="hero-grid">
    <div class="hero-copy">
      <h1 data-he-html="מ<span class=&quot;b&quot;>חוסן</span> לחדשנות גלובלית">From <span class="b">Resilience</span> to Global Innovation</h1>
      <p class="lead" data-he="מרכז המחבר בין קלינאים, יזמים ושותפים אסטרטגיים, והופך את הרגעים האנושיים הקשים ביותר לפריצות הדרך של הדור הבא.">A hub connecting clinicians, entrepreneurs and strategic partners, turning the hardest human moments into the next generation of breakthroughs.</p>
      <p class="lead" data-he="ממוקם בשדרות, ונבנה יחד עם המרכז הרפואי שיבא, המכללה האקדמית ספיר ועיריית שדרות.">Based in Sderot, built with Sheba Medical Center, Sapir Academic College and the Sderot Municipality.</p>
      <div class="cta-row">
        <button class="btn-primary" id="missionBtn" data-he="הכירו את המשימה שלנו ←">Learn About Our Mission →</button>
        <button class="btn-ghost" id="programsBtn" data-he="גלו את התוכניות">Explore programs</button>
      </div>
    </div>
    <div class="hero-visual">
      <div class="globe-stage" aria-hidden="true">
        <svg class="globe-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
          <defs>
            <radialGradient id="globeBg" cx="36%" cy="30%">
              <stop offset="0%" stop-color="#00588b" stop-opacity=".48"></stop>
              <stop offset="55%" stop-color="#0a1c2e" stop-opacity=".30"></stop>
              <stop offset="100%" stop-color="#051221" stop-opacity=".04"></stop>
            </radialGradient>
            <radialGradient id="coreGlow" cx="50%" cy="50%">
              <stop offset="0%" stop-color="#0074b5" stop-opacity=".55"></stop>
              <stop offset="55%" stop-color="#112c47" stop-opacity=".22"></stop>
              <stop offset="100%" stop-color="#051221" stop-opacity="0"></stop>
            </radialGradient>
            <radialGradient id="atmo" cx="50%" cy="50%">
              <stop offset="0%" stop-color="#38B6FF" stop-opacity="0"></stop>
              <stop offset="88%" stop-color="#38B6FF" stop-opacity="0"></stop>
              <stop offset="97%" stop-color="#A6ECFF" stop-opacity=".10"></stop>
              <stop offset="100%" stop-color="#A6ECFF" stop-opacity="0"></stop>
            </radialGradient>
            <clipPath id="globeClip"><circle cx="200" cy="200" r="174"></circle></clipPath>
          </defs>

          <!-- atmosphere halo (behind sphere) -->
          <circle cx="200" cy="200" r="176" fill="url(#atmo)"></circle>

          <g clip-path="url(#globeClip)">
            <circle cx="200" cy="200" r="170" fill="url(#globeBg)"></circle>
            <circle cx="200" cy="190" r="92" fill="url(#coreGlow)"></circle>
            <image class="globe-logo" href="../../assets/logo.png" x="118" y="98" width="164" height="196" preserveAspectRatio="xMidYMid meet"></image>

            <g class="globe-spin">
              <!-- fine wireframe: latitudes + longitudes -->
              <g stroke="rgba(56,182,255,.16)" fill="none" stroke-width="1">
                <ellipse cx="200" cy="200" rx="170" ry="36"></ellipse>
                <ellipse cx="200" cy="200" rx="170" ry="72"></ellipse>
                <ellipse cx="200" cy="200" rx="170" ry="108"></ellipse>
                <ellipse cx="200" cy="200" rx="170" ry="144"></ellipse>
                <ellipse cx="200" cy="200" rx="36" ry="170"></ellipse>
                <ellipse cx="200" cy="200" rx="72" ry="170"></ellipse>
                <ellipse cx="200" cy="200" rx="108" ry="170"></ellipse>
                <ellipse cx="200" cy="200" rx="144" ry="170"></ellipse>
              </g>
              <!-- bright axes (equator + prime meridian) + sphere outline -->
              <g stroke="rgba(56,182,255,.32)" fill="none" stroke-width="1.1">
                <circle cx="200" cy="200" r="170"></circle>
                <line x1="30" y1="200" x2="370" y2="200"></line>
                <line x1="200" y1="30" x2="200" y2="370"></line>
              </g>

              <!-- network nodes -->
              <g fill="#38B6FF">
                <circle cx="96" cy="128" r="2.1"></circle><circle cx="110" cy="140" r="2.1"></circle><circle cx="84" cy="160" r="2.1"></circle>
                <circle cx="300" cy="124" r="2.1"></circle><circle cx="320" cy="140" r="2.1"></circle><circle cx="296" cy="150" r="2.1"></circle>
                <circle cx="78" cy="250" r="2.1"></circle><circle cx="96" cy="272" r="2.1"></circle>
                <circle cx="310" cy="250" r="2.1"></circle><circle cx="320" cy="268" r="2.1"></circle>
                <circle cx="130" cy="92" r="2.1"></circle><circle cx="270" cy="92" r="2.1"></circle>
                <circle cx="150" cy="308" r="2.1"></circle><circle cx="250" cy="308" r="2.1"></circle>
              </g>
              <g fill="#7BE0FF">
                <circle cx="130" cy="180" r="2.7"></circle><circle cx="270" cy="180" r="2.7"></circle>
                <circle cx="130" cy="235" r="2.7"></circle><circle cx="270" cy="235" r="2.7"></circle>
              </g>
              <g fill="rgba(56,182,255,.32)">
                <circle cx="60" cy="200" r="1.4"></circle><circle cx="340" cy="200" r="1.4"></circle>
                <circle cx="200" cy="55" r="1.4"></circle><circle cx="200" cy="345" r="1.4"></circle>
                <circle cx="118" cy="118" r="1.4"></circle><circle cx="282" cy="118" r="1.4"></circle>
                <circle cx="118" cy="282" r="1.4"></circle><circle cx="282" cy="282" r="1.4"></circle>
              </g>
            </g>
          </g>

          <!-- soft atmosphere rim -->
          <circle cx="200" cy="200" r="170" fill="none" stroke="rgba(0,88,139,.26)" stroke-width="1"></circle>

          <g class="orbit-sat">
            <circle cx="262" cy="150" r="2.4" fill="#A6ECFF"></circle>
            <circle cx="138" cy="262" r="2" fill="#7be0ff"></circle>
          </g>
        </svg>
        <span class="spark s1"></span><span class="spark s2"></span><span class="spark s3"></span><span class="spark s4"></span>
      </div>
    </div>
  </div>

</header>
<script>
document.getElementById('missionBtn').addEventListener('click', () => {
  window.parent.postMessage({t: 'ih:nav', to: 'about/index.html'}, '*');
});
document.getElementById('programsBtn').addEventListener('click', () => {
  window.parent.postMessage({t: 'ih:nav', to: 'programs/index.html'}, '*');
});
</script>
<script src="../../shared/i18n.js"></script>
<script src="_bridge.js" data-frame="hero"></script>
</body>
</html>
