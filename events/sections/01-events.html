<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ecosystem Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#051221;--ink:#FFFFFF;--ink-2:#D6E2EE;
  --bg-light:#FFFFFF;--bg-alt:#F5F8FA;
  --ink-dark:#0D2436;--ink-mid:#3F546A;
  --teal-deep:#00588B;--teal:#0074B5;--teal-2:#38B6FF;--gold:#A6ECFF;
  --line:rgba(13,36,54,.08);--pad:6vw;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope','Heebo',system-ui,sans-serif;background:var(--bg-0);color:var(--ink-dark);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body.reduce-motion *{animation-duration:0s!important;transition-duration:0s!important}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}

.reveal{opacity:0;transform:translateY(24px) scale(.985);transition:opacity .8s ease, transform .8s cubic-bezier(.16,.84,.28,1)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.15s}
.reveal.d2{transition-delay:.3s}

.hero-banner{
  background: var(--bg-0);
  color: var(--ink);
  padding: 130px var(--pad) 70px;
  position: relative;
  overflow: hidden;
}
.hero-banner .eyebrow{color:var(--teal-2)}
.hero-banner h2.headline{color:var(--ink)}
.hero-banner h2.headline .accent{color:var(--teal-2)}
.hero-banner .section-head .right{color:var(--ink-2)}

.bg-glow{
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 70% 30%, rgba(56,182,255,.08), transparent 50%), radial-gradient(circle at 20% 80%, rgba(123,224,255,.04), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.events-content{
  position: relative;
  padding: 56px var(--pad) 96px;
  background: linear-gradient(180deg, var(--bg-light) 0%, var(--bg-alt) 100%);
}
.container{max-width:1200px;margin:0 auto}

.section-head{max-width:1200px;margin:0 auto 56px;display:grid;grid-template-columns:auto 1fr;gap:36px;align-items:end}
.section-head .left{max-width:640px}
.section-head .right{align-self:end;font-size:15.5px;line-height:1.7;max-width:440px;color:var(--ink-mid)}
.eyebrow{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--teal-deep);font-weight:800;margin-bottom:16px;display:inline-flex;align-items:center;gap:10px}

h2.headline{font-family:'Manrope';font-weight:800;font-size:clamp(32px,3.8vw,52px);line-height:1.05;letter-spacing:-.02em}
h2.headline .accent{color:var(--teal-deep)}

.events-tabs{position:relative;z-index:2;display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px;width:fit-content;margin:0 auto 50px;box-shadow:0 10px 24px -14px rgba(13,36,54,.15)}
.events-tab{position:relative;z-index:2;padding:11px 28px;border-radius:999px;background:transparent;color:var(--ink-mid);font-size:12.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:color .25s}
.events-tab.active{color:#fff}
.ev-pill-bg{position:absolute;top:6px;bottom:6px;border-radius:999px;background:var(--ink-dark);transition:left .3s cubic-bezier(.2,.7,.2,1),width .3s cubic-bezier(.2,.7,.2,1);z-index:1;left:6px;width:0}

.events-grid{position:relative;z-index:2;display:flex;flex-direction:column;gap:18px;max-width:1200px;margin:0 auto}
.event{display:grid;grid-template-columns:210px 1fr;gap:28px;align-items:stretch;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;box-shadow:0 8px 30px -10px rgba(13,36,54,.06)}

/* media tile: real photo when set, branded gradient placeholder otherwise. date + category overlay on top */
.event .ev-media{position:relative;border-radius:14px;overflow:hidden;min-height:158px;background:linear-gradient(150deg,var(--teal-deep) 0%,var(--ink-dark) 72%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
.event .ev-media::after{content:"";position:absolute;inset:0;background:radial-gradient(130px 100px at 82% 12%, rgba(56,182,255,.28), transparent 70%);pointer-events:none;z-index:1}
.event .ev-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:0}
.event .ev-date{position:absolute;left:12px;top:12px;z-index:2;background:rgba(255,255,255,.94);border-radius:11px;padding:7px 11px 6px;text-align:center;box-shadow:0 8px 20px -8px rgba(13,36,54,.5)}
.event .ev-date .day{font-family:'Manrope';font-weight:800;font-size:27px;color:var(--ink-dark);letter-spacing:-.03em;line-height:1}
.event .ev-date .month-year{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-mid);font-weight:700;margin-top:3px}
.event .ev-pill{position:absolute;left:12px;bottom:12px;z-index:2;display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#fff;background:rgba(5,18,33,.55);border:1px solid rgba(255,255,255,.18);padding:5px 11px;border-radius:999px;font-weight:700}

.event .body{align-self:center}
.event .body h3{font-family:'Manrope';font-weight:800;font-size:22px;line-height:1.2;letter-spacing:-.012em;color:var(--ink-dark)}
.event .body h3.he{font-family:'Heebo',sans-serif;direction:rtl;text-align:right}
.event .body p{margin-top:8px;color:var(--ink-mid);font-size:14.5px;line-height:1.6;max-width:700px}
.event .body p.he{font-family:'Heebo',sans-serif;direction:rtl;text-align:right}
.event .body .meta{margin-top:12px;display:flex;gap:14px;font-size:12.5px;color:var(--ink-mid);font-weight:600}
.event .body .meta.he{direction:rtl;justify-content:flex-start}
.event .body .meta span{display:inline-flex;align-items:center;gap:6px}
.event .body .meta svg{opacity:.6}

.events-empty{text-align:center;color:var(--ink-mid);font-size:15px;padding:56px 24px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 8px 30px -10px rgba(13,36,54,.06)}
.events-empty h3{font-family:'Manrope';font-weight:800;font-size:20px;color:var(--ink-dark);margin-bottom:8px}
.events-empty p{max-width:460px;margin:0 auto 20px;line-height:1.65}
.events-empty .fl{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.events-empty .fl a{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;border:1px solid var(--line);background:var(--bg-alt);color:var(--ink-dark);font-weight:700;font-size:13.5px;text-decoration:none;transition:.2s}
.events-empty .fl a:hover{background:var(--teal-deep);border-color:var(--teal-deep);color:#fff}

@media (max-width:900px){
  .section-head{grid-template-columns:1fr;gap:20px}
  .event{grid-template-columns:1fr;gap:16px;padding:14px}
  .event .ev-media{min-height:150px}
}
@media (max-width:600px){
  :root{--pad:20px}
  .hero-banner{padding:92px var(--pad) 48px}
  .events-content{padding:44px var(--pad) 64px}
  .section-head{margin-bottom:32px}
  .events-tabs{margin-bottom:32px}
  .events-tab{padding:14px 24px}
  .event .body p{font-size:15px}
  .event .body .meta{font-size:13px}
}
</style>
</head>
<body>
<header class="hero-banner">
  <div class="bg-glow"></div>
  <div class="container" style="position:relative; z-index:2;">
    <div class="section-head">
      <div class="left">
        <h2 class="headline reveal" data-he-html="כאן <span class=&quot;accent&quot;>הקהילה נפגשת</span>">Where the <span class="accent">Community Gathers</span></h2>
      </div>
      <div class="right reveal d1" data-he="כנסים, פסגות מקצועיות, הרצאות אקדמיות ומפגשים מקומיים שמחברים את רשת טכנולוגיית החוסן העולמית.">Conferences, professional summits, academic lectures and local meetup events that bring together the global resilience tech network.</div>
    </div>
  </div>
</header>

<section class="events-content">
  <div class="container">
    <div class="events-tabs" role="tablist">
      <span class="ev-pill-bg" id="evPill"></span>
      <button class="events-tab active" data-evt="upcoming" data-he="קרובים">Upcoming</button>
      <button class="events-tab" data-evt="recent" data-he="אחרונים">Recent</button>
    </div>

    <div class="events-grid" id="eventsGrid"></div>
  </div>
</section>

<script>
/* Events are loaded at runtime from /data/events.json (managed via the local
   admin tool). The section file sits two levels deep, so paths are prefixed. */
const EVENTS_URL = '../../data/events.json';
const IMG_BASE = '../../';

/* No fabricated fallback — if the data file is missing we show the empty state. */
const DEFAULT_EVENTS = { upcoming: [], recent: [] };

(function(){
  const grid=document.getElementById('eventsGrid');
  let dataToUse = null;

  function isHebrew(t){ return /[֐-׿]/.test(t||''); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function imgPath(p){ return IMG_BASE + String(p).replace(/^\/+/,''); }

  function render(key){
    const items = (dataToUse && dataToUse[key]) ? dataToUse[key] : (DEFAULT_EVENTS[key]||[]);
    if(!items.length){
      grid.innerHTML='<div class="events-empty">'+
        '<h3 data-he="'+(key==='upcoming'?'אירועים חדשים בדרך':'עדיין אין כאן דבר')+'">'+(key==='upcoming'?'New events are on the way':'Nothing here yet')+'</h3>'+
        '<p data-he="'+(key==='upcoming'
          ? 'כנסים, סדנאות וימי קהילה קרובים מוכרזים כאן ראשונים. עקבו אחרינו כדי לשמוע עליהם ברגע שייפתחו:'
          : 'רגעים נבחרים מאירועי עבר יופיעו כאן. בינתיים, עקבו אחרי המרכז לעדכונים שוטפים:')+'">'+(key==='upcoming'
          ? 'Upcoming conferences, workshops and community days are announced here first. Follow us to hear about them the moment they open:'
          : 'Highlights from past events will appear here. In the meantime, follow the hub for day-to-day updates:')+'</p>'+
        '<div class="fl">'+
          '<a href="https://il.linkedin.com/company/resilience-health-innovation-hub" target="_blank" rel="noopener noreferrer">LinkedIn</a>'+
          '<a href="https://www.facebook.com/profile.php?id=61560256910952" target="_blank" rel="noopener noreferrer">Facebook</a>'+
        '</div>'+
      '</div>';
      if(window.IHI18N) IHI18N.apply(IHI18N.get());
      if(window.__frameReport) window.__frameReport(); return;
    }
    grid.innerHTML=items.map(function(e){
      const th = isHebrew(e.title), dh = isHebrew(e.desc);
      const img = e.image ? '<img src="'+esc(imgPath(e.image))+'" alt="'+esc(e.title)+'" loading="lazy">' : '';
      return ''+
      '<article class="event" style="opacity:0;transform:translateY(20px)">'+
        '<div class="ev-media">'+img+
          '<div class="ev-date"><div class="day">'+esc(e.day)+'</div><div class="month-year">'+esc(e.monthYear)+'</div></div>'+
          '<span class="ev-pill">'+esc(e.pill)+'</span>'+
        '</div>'+
        '<div class="body">'+
          '<h3 class="'+(th?'he':'')+'">'+esc(e.title)+'</h3>'+
          '<p class="'+(dh?'he':'')+'">'+esc(e.desc)+'</p>'+
          '<div class="meta '+(th?'he':'')+'">'+
            '<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-7.5-7-12a7 7 0 0114 0c0 4.5-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>'+esc(e.city)+'</span>'+
          '</div>'+
        '</div>'+
      '</article>';
    }).join('');

    requestAnimationFrame(function(){
      grid.querySelectorAll('.event').forEach(function(el,i){
        setTimeout(function(){
          el.style.opacity=1;el.style.transform='translateX(0)';
          el.style.transition='opacity .5s ease, transform .4s cubic-bezier(.2,.7,.2,1), border-color .3s, box-shadow .3s';
          if(window.__frameReport) window.__frameReport();
        },i*70);
      });
    });
  }

  function positionPill(){
    const active=document.querySelector('.events-tab.active');
    const pill=document.getElementById('evPill');
    if(active&&pill){pill.style.left=active.offsetLeft+'px';pill.style.width=active.offsetWidth+'px';}
  }

  document.querySelectorAll('.events-tab').forEach(function(t){t.addEventListener('click',function(){
    document.querySelectorAll('.events-tab').forEach(function(x){x.classList.remove('active');});
    t.classList.add('active');positionPill();render(t.dataset.evt);
  });});

  fetch(EVENTS_URL)
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){ dataToUse=data; render('upcoming'); positionPill(); })
    .catch(function(err){
      console.warn('Could not load events.json, using fallback.', err);
      dataToUse=DEFAULT_EVENTS; render('upcoming'); positionPill();
    });

  addEventListener('resize',positionPill);
})();
</script>
<script src="../../shared/i18n.js"></script>
<script src="_bridge.js" data-frame="events"></script>
</body>
</html>
